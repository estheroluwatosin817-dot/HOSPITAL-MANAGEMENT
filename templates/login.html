{% extends "base.html" %}

{% block content %}
<section class="hero-panel">
  <div class="hero-copy">
    <span class="eyebrow">Staff Login</span>
    <h2>Enter the Kiitan's Health Care admin portal.</h2>
    <p>Use your credentials to access patient records, appointments, billing, and staff tools.</p>
  </div>
  <div class="panel login-panel">
    <form method="post" class="form-panel">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required />
      </div>
      <button type="submit" class="button primary full-width">Sign In</button>
      <p class="muted-note">Try one of the valid login combinations: <strong>esther / okeleye123</strong> or <strong>okeleye / esther</strong></p>
    </form>
  </div>
</section>
{% endblock %}
